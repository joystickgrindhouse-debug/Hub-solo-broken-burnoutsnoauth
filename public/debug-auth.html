<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Debug: Demo Auth</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding:20px; background:#0b0b0b; color:#fff }
    .card{background:#111;padding:16px;border-radius:8px;max-width:720px;margin:12px auto}
    button{font-size:16px;padding:10px 14px;margin:6px;border-radius:6px;border:none}
    .enable{background:#2a9d8f;color:#fff}
    .disable{background:#e76f51;color:#fff}
    a{color:#66c0ff}
    .hint{font-size:13px;opacity:0.9}
  </style>
</head>
<body>
  <div class="card">
    <h2>Demo Auth (iPad-friendly)</h2>
    <p class="hint">Use these buttons to enable a local demo user so pages show content without signing in.</p>
    <div>
      <button class="enable" id="btnEnable">Enable Demo Auth</button>
      <button class="disable" id="btnDisable">Disable Demo Auth</button>
    </div>
    <p class="hint">After enabling, open the app root or refresh the page to see demo content.</p>
    <p><a id="openRoot" href="/">Open app root</a></p>
    <hr style="border-color:#222" />
    <p class="hint">This toggles <strong>localStorage.DEV_AUTH</strong>. No server changes are made.</p>
  </div>

  <script>
    const btnEnable = document.getElementById('btnEnable');
    const btnDisable = document.getElementById('btnDisable');
    const openRoot = document.getElementById('openRoot');

    function setEnabled() {
      localStorage.setItem('DEV_AUTH', '1');
      alert('Demo auth enabled. Refresh the app root to see demo content.');
    }

    function setDisabled() {
      localStorage.removeItem('DEV_AUTH');
      alert('Demo auth disabled. Refresh the app root.');
    }

    btnEnable.addEventListener('click', setEnabled);
    btnDisable.addEventListener('click', setDisabled);

    // For convenience on iOS, make the root link open in the same tab.
    openRoot.setAttribute('target', '_self');
  </script>
</body>
</html>
